user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;
    gzip_disable "msie6";

    # Upstream backend service
    upstream backend {
        # Use Docker's internal DNS resolution
        server backend:8080;
    }

    server {
        listen 3000;
        server_name _;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # Static Asset Caching
        # ============================================
        # Cache versioned assets (with hash in filename) for 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ============================================
        # API Proxy
        # ============================================
        # Route /api/* requests to the backend service
        location /api/ {
            proxy_pass http://backend/api/;
            
            # Headers for proper proxying
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts for backend
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ============================================
        # SPA Routing
        # ============================================
        # For any request that doesn't match static assets or API,
        # serve index.html (enables client-side routing)
        location / {
            try_files $uri $uri/ /index.html;
            
            # Don't cache the index.html file itself
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # ============================================
        # Security Headers
        # ============================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ============================================
        # Error Pages
        # ============================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
